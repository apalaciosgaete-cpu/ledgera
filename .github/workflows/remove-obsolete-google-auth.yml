name: Remove obsolete Google auth

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-obsolete-google-auth.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Remove obsolete auth models and tables
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const schemaPath = 'prisma/schema.prisma';
          let schema = fs.readFileSync(schemaPath, 'utf8');

          schema = schema
            .replace(/^\s*authAccounts\s+Account\[\]\s*\n/m, '')
            .replace(/^\s*authSessions\s+Session\[\]\s*\n/m, '')
            .replace(/\nmodel Account \{[\s\S]*?\n\}\n\nmodel Session \{[\s\S]*?\n\}\n\nmodel VerificationToken \{[\s\S]*?\n\}\n/g, '\n');

          const forbiddenSchemaTerms = [
            'model Account {',
            'model Session {',
            'model VerificationToken {',
            'authAccounts',
            'authSessions',
            '@@map("auth_accounts")',
            '@@map("auth_sessions")',
            '@@map("auth_verification_tokens")',
          ];

          for (const term of forbiddenSchemaTerms) {
            if (schema.includes(term)) {
              throw new Error(`No se pudo eliminar del schema: ${term}`);
            }
          }

          fs.writeFileSync(schemaPath, schema);

          const migrationDir = 'prisma/migrations/20260713_remove_google_oauth';
          fs.mkdirSync(migrationDir, { recursive: true });
          fs.writeFileSync(
            path.join(migrationDir, 'migration.sql'),
            [
              '-- Retira las tablas residuales del adaptador OAuth/NextAuth.',
              'DROP TABLE IF EXISTS "auth_accounts" CASCADE;',
              'DROP TABLE IF EXISTS "auth_sessions" CASCADE;',
              'DROP TABLE IF EXISTS "auth_verification_tokens" CASCADE;',
              '',
            ].join('\n'),
          );

          const obsoletePaths = [
            'src/app/api/auth/google',
            'src/app/api/auth/[...nextauth]',
            'src/app/api/2fa/oauth-setup',
            'src/lib/auth.ts',
            'src/hooks/useAuth.ts',
            'src/components/auth/AuthEntryTrustOverlay.tsx',
          ];

          for (const obsoletePath of obsoletePaths) {
            fs.rmSync(obsoletePath, { recursive: true, force: true });
          }

          const scanRoots = ['src', 'tests', 'docs', 'package.json'];
          const forbiddenSourceTerms = [
            '/api/auth/google',
            'GOOGLE_CLIENT_ID',
            'GOOGLE_CLIENT_SECRET',
            'GOOGLE_REDIRECT_URI',
            'NEXTAUTH_SECRET',
            'NEXTAUTH_URL',
            'next-auth',
            '@auth/prisma-adapter',
            'oauth2fa',
            'oauth-setup',
            'AuthEntryTrustOverlay',
          ];

          function filesUnder(target) {
            if (!fs.existsSync(target)) return [];
            const stat = fs.statSync(target);
            if (stat.isFile()) return [target];
            return fs.readdirSync(target, { withFileTypes: true }).flatMap((entry) =>
              filesUnder(path.join(target, entry.name)),
            );
          }

          for (const file of scanRoots.flatMap(filesUnder)) {
            if (!/\.(?:ts|tsx|js|mjs|cjs|json|md)$/.test(file)) continue;
            const content = fs.readFileSync(file, 'utf8');
            for (const term of forbiddenSourceTerms) {
              if (content.includes(term)) {
                throw new Error(`Referencia obsoleta ${term} encontrada en ${file}`);
              }
            }
          }
          NODE

      - name: Install dependencies
        run: npm install

      - name: Validate Prisma schema
        run: npx prisma format

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Commit cleanup directly to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove obsolete google oauth database models"
          git push origin HEAD:main
