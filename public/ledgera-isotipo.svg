<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" fill="none">
  <defs>
    <!-- Gradientes basados en paleta oficial de la guía de marca -->
    <!-- Azul financiero #1E40AF y azul análisis #3BBDF8 -->
    <linearGradient id="blueBook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3BBDF8"/>
      <stop offset="40%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="blueEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3BBDF8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Oro suave #EFD996 y arena premium #D9B668 -->
    <linearGradient id="gold1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9B668"/>
      <stop offset="60%" stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#EFD996"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9B668"/>
      <stop offset="60%" stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#EFD996"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9B668"/>
      <stop offset="60%" stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#EFD996"/>
    </linearGradient>
    <!-- Flecha curva -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D9B668"/>
      <stop offset="100%" stop-color="#EFD996"/>
    </linearGradient>
    <!-- Highlight metálico -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Sombra 3D -->
    <filter id="shadow3d" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- ISOTIPO LEDGERA - Sin fondo -->
  <g transform="translate(10, 8)" filter="url(#shadow3d)">
    <!-- LIBRO ABIERTO AZUL -->
    <!-- Página izquierda (azul) -->
    <path d="M10 50 L44 32 L44 62 L10 78 Z" fill="url(#blueBook)"/>
    <!-- Página derecha (azul) -->
    <path d="M86 50 L52 32 L52 62 L86 78 Z" fill="url(#blueBook)"/>
    
    <!-- Borde superior izquierdo (efecto 3D) -->
    <path d="M10 48 L44 30 L44 33 L14 49 Z" fill="url(#blueEdge)"/>
    <!-- Borde superior derecho (efecto 3D) -->
    <path d="M86 48 L52 30 L52 33 L82 49 Z" fill="url(#blueEdge)"/>
    
    <!-- Brillo superior izquierdo -->
    <path d="M14 46 L44 30 L44 36 L18 50 Z" fill="#3BBDF8" opacity="0.35"/>
    <!-- Brillo superior derecho -->
    <path d="M82 46 L52 30 L52 36 L78 50 Z" fill="#3BBDF8" opacity="0.35"/>
    
    <!-- Línea central del libro (lomo) -->
    <path d="M44 30 L44 62" stroke="#0A3D91" stroke-width="2.5"/>
    
    <!-- Detalle V del libro (pliegue de páginas) -->
    <path d="M18 56 L44 42 L70 56" stroke="#3BBDF8" stroke-width="1.5" fill="none" opacity="0.5"/>
    
    <!-- BARRAS DORADAS ASCENDENTES -->
    <!-- Barra 1 (corta, izquierda) -->
    <path d="M26 30 L42 20 L42 54 L26 62 Z" fill="url(#gold1)"/>
    <!-- Barra 2 (media, centro) -->
    <path d="M43 18 L59 8 L59 58 L43 66 Z" fill="url(#gold2)"/>
    <!-- Barra 3 (alta, derecha) -->
    <path d="M60 4 L76 -4 L76 62 L60 70 Z" fill="url(#gold3)"/>
    
    <!-- Highlights en barras (efecto metálico 3D) -->
    <path d="M28 30 L42 20 L42 24 L28 33 Z" fill="url(#metalHighlight)"/>
    <path d="M45 18 L59 8 L59 12 L45 21 Z" fill="url(#metalHighlight)"/>
    <path d="M62 4 L76 -4 L76 0 L62 8 Z" fill="url(#metalHighlight)"/>
    
    <!-- Sombras en barras (efecto 3D) -->
    <path d="M26 58 L42 50 L42 54 L26 62 Z" fill="#000" opacity="0.15"/>
    <path d="M43 62 L59 54 L59 58 L43 66 Z" fill="#000" opacity="0.15"/>
    <path d="M60 66 L76 58 L76 62 L60 70 Z" fill="#000" opacity="0.15"/>
    
    <!-- FLECHA CURVA ASCENDENTE -->
    <path d="M18 46 C30 28, 48 14, 74 8" stroke="url(#arrowGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    
    <!-- Punta de flecha -->
    <polygon points="70,2 82,8 74,16" fill="#EFD996"/>
    
    <!-- Highlight en flecha -->
    <path d="M18 44 C30 26, 48 12, 74 6" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
