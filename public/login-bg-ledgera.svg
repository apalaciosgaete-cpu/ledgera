<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1050" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081426"/>
      <stop offset="0.45" stop-color="#061123"/>
      <stop offset="1" stop-color="#020713"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b2737"/>
      <stop offset="0.55" stop-color="#0d1727"/>
      <stop offset="1" stop-color="#040916"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2b45d" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#ffd28a" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14335d" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#061020" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="44%" cy="48%" r="42%">
      <stop offset="0" stop-color="#6ebbea" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#2d6aa4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
